<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-2ZD42Y9WN8"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-2ZD42Y9WN8');
    </script>
    <title>기타 & 베이스 & 키보드 스케일/코드 뷰어</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>

    <div class="controls-container">
        <div class="controls-row">
            <button id="lang-btn" class="btn lang-btn">🌐 English</button>
            <button id="guitar-btn" class="btn instrument-btn active">🎸 기타 (6줄)</button>
            <button id="bass-btn" class="btn instrument-btn">🎸 베이스 (4줄)</button>
            <button id="keyboard-btn" class="btn instrument-btn">🎹 키보드 (피아노)</button>
            
            <span id="tuning-controls" style="display:inline-flex; align-items:center; gap:8px;">
                <label id="lbl-tuning">튜닝: </label>
                <select id="tuning-select" style="min-width: 120px;"></select>
            </span>
            
            <button id="scale-mode-btn" class="btn mode-btn active">🎶 스케일 모드</button>
            <button id="chord-mode-btn" class="btn mode-btn">🎹 코드 모드</button>
            <button id="capture-btn" class="btn capture-btn">📸 지판/악보 저장</button>
        </div>

        <div class="divider"></div>

        <div class="controls-row">
            <label id="lbl-key">조(Key/Root): </label>
            <select id="key-select"></select>
            
            <span id="scale-controls" style="display:inline-flex; flex-wrap:wrap; align-items:center; gap:8px;">
                <label id="lbl-major">메이저 계열: </label>
                <select id="major-select"><option value="">-- 선택 --</option></select>
                <label id="lbl-minor">마이너 계열: </label>
                <select id="minor-select"><option value="">-- 선택 --</option></select>
                <button id="add-scale-btn" class="btn" style="background-color:#4CAF50; color:white; display:none;">➕ 스케일 추가</button>
            </span>

            <span id="chord-controls" style="display:none; flex-wrap:wrap; align-items:center; gap:8px;">
                <label id="lbl-chord">코드 종류: </label>
                <select id="chord-select"><option value="">-- 선택 --</option></select>
                <button id="add-chord-btn" class="btn" style="background-color:#4CAF50; color:white; display:none;">➕ 악보에 추가</button>
                <button id="add-custom-btn" class="btn" style="background-color:#2196F3; color:white; display:none;">➕ 빈 지판 추가</button>
                <button id="toggle-diagram-btn" class="btn" style="background-color:#9c27b0; color:white; display:none;">📋 코드표로 보기</button>
            </span>
            
            <span id="shared-controls" style="display:inline-flex; flex-wrap:wrap; align-items:center; gap:8px; margin-left:auto;">
                <button id="save-json-btn" class="btn" style="background-color:#FF9800; color:white; display:none;">💾 악보 저장</button>
                <button id="load-json-btn" class="btn" style="background-color:#00BCD4; color:white; display:inline-block;">📂 불러오기</button>
                <input type="file" id="load-json-input" accept=".json" style="display:none;">
                <button id="clear-progression-btn" class="btn" style="background-color:#f44336; color:white; display:none;">🗑️ 비우기</button>
            </span>
        </div>
    </div>

    <div class="fretboard-scroll-wrapper">
        <div id="capture-area">
            <h2 id="capture-title">Guitar C Blues</h2>
            
            <div id="fretboard-view">
                <div class="fret-numbers" id="fret-numbers"></div>
                <div id="fretboard" class="fretboard instrument-guitar"></div>
            </div>
            
            <div id="scale-progression-view" style="display:none; flex-direction:column; gap:25px; margin-top:30px;"></div>

            <div id="chord-diagram-view" style="display:none; padding: 20px 0;"></div>
        </div>
    </div>

    <div class="analyzer">
        <h3>
            <span id="lbl-analyzer-title">🔍 화성 분석기 (코드 & 스케일)</span>
            <button id="clear-custom-btn" class="btn">초록/보라색 초기화</button>
        </h3>
        <div id="scale-analysis-result" class="analyzer-content"></div>
    </div>

    <div class="controls-container" style="margin-top: 20px;">
        <div class="controls-row">
            <label id="lbl-find-note" style="min-width: 160px;">특정 음 찾기 (보라색): </label>
            <div id="note-buttons-container" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
        </div>

        <div class="divider" id="form-toggle-divider"></div>

        <div class="controls-row" id="form-toggle-row">
            <label id="lbl-form-toggle">🎸 폼(포지션) 영역 표시: </label>
            <button id="toggle-form-btn" class="btn" style="background-color: #e0e0e0; color: #333;">OFF</button>
            <select id="form-select" style="display:none;">
                <option value="1">1번 폼 (Root-6)</option>
                <option value="2">2번 폼</option>
                <option value="3">3번 폼</option>
                <option value="4">4번 폼</option>
                <option value="5">5번 폼 (Root-5)</option>
            </select>
        </div>
    </div>

    <div class="youtube-footer">
        <a href="https://www.youtube.com/@kimpandol123" target="_blank" rel="noopener noreferrer" class="youtube-link">
            🎬 kimpandol YouTube Channel
        </a>
    </div>

    <script src="script.js"></script>
</body>
</html>
