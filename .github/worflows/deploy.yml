name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"] # 내 브랜치가 master라면 master로 수정!
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # Vite는 결과물이 dist 폴더에 생겨!

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4